server:
  port: 8082

spring:
  application:
    name: Consumer
  data:
    mongodb:
      uri: mongodb://localhost:27017/texttolearn
      database: texttolearn
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}

rabbitmq:
  exchange: texttolearn.exchange
  queue: texttolearn.queue
  routing-key: "topic.#"
  persistence:
    queue: texttolearn.persistence.queue
    routing-key: "persistence.#"
